services:
  intelligence:
    build: .                     # builds from source in this folder
    container_name: intelligence
    ports:
      - "8001:8001"
    volumes:
      - intel-data:/app/data     # all articles, summaries, and the knowledge graph persist here
    env_file:
      - .env                     # put your GEMINI_API_KEY in this file (see README)
    restart: unless-stopped      # auto-restarts if your machine reboots
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  intel-data:
